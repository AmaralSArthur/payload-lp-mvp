services:
  mongo:
    image: mongo:7
    container_name: payload-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payload-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PAYLOAD_SECRET=dev-secret-change-in-production
      - DATABASE_URI=mongodb://mongo:27017/payload-lp
      - NEXT_PUBLIC_SERVER_URL=http://localhost:3000
    volumes:
      - ./backend/src:/app/src
      - ./backend/payload.config.ts:/app/payload.config.ts
      - ./backend/next.config.ts:/app/next.config.ts
      - ./backend/tsconfig.json:/app/tsconfig.json
      - payload-media:/app/public/media
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payload-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/.npmrc:/app/.npmrc
      - ./frontend/angular.json:/app/angular.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
  payload-media:
